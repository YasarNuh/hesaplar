<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaşar Nuh Donma</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
overflow:hidden;
position:relative;
background:url('https://cdn.pixabay.com/photo/2021/09/25/09/46/geometric-background-6654520_1280.jpg') center/cover no-repeat fixed;
}

/* koyu film efekti */
body::before{
content:'';
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
backdrop-filter:blur(1px);
z-index:0;
}

/* kırmızı hareketli enerji katmanı */
body::before{
  background:rgba(0,0,0,.75);
}
content:'';
position:fixed;
inset:-40%;
background:linear-gradient(120deg,
transparent 0%,
rgba(255,0,0,.18) 45%,
transparent 70%);
animation:redMove 4s linear infinite;
mix-blend-mode:screen;
opacity:.8;
z-index:0;
}

@keyframes redMove{
from{transform:translateX(-25%) translateY(-10%) rotate(0deg);}
to{transform:translateX(25%) translateY(10%) rotate(3deg);}
}

.card{
position:relative;
z-index:2;
width:92%;
max-width:520px;
background:rgba(0,0,0,.45);
border:1px solid rgba(255,255,255,.10);
backdrop-filter:blur(10px);
padding:32px;
border-radius:24px;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

.name{
font-size:28px;
font-weight:800;
text-align:center;
letter-spacing:1px;
margin-bottom:24px;
cursor:pointer;
transition:.3s;
}

.name:hover{
color:#ff2b2b;
text-shadow:0 0 10px #ff0000,0 0 25px #ff0000;
transform:scale(1.05);
}

.links{
display:grid;
gap:14px;
}

.btn{
display:block;
text-decoration:none;
color:#fff;
text-align:center;
padding:16px;
border-radius:16px;
background:linear-gradient(135deg,#1b1b1b,#2a2a2a);
border:1px solid rgba(255,255,255,.08);
transition:.25s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(255,0,0,.25);
border-color:#ff2b2b;
}

</style>
</head>
<body>

<div class="card">
<div class="name">Yaşar Nuh Donma</div>
<div class="links">
<a class="btn" href="https://open.spotify.com/user/31m754rveers3rxlu5sh7qsgcmzu">Spotify</a>
<a class="btn" href="https://x.com/donma_nuh20630">X / Twitter</a>
<a class="btn" href="https://music.youtube.com/@yasarnuh7571">YouTube Music</a>
</div>
</div>

</body>
</html>
